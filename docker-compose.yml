services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - VITE_API_URL=http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - mock-api

  mock-api:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run mock:server"
    volumes:
      - ./:/app
    ports:
      - "4000:4000"
